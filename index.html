<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Shweta ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    text-align: center;
    overflow: hidden;
}

.page, #menu, #gift, #lock {
    display: none;
    height: 100vh;
    width: 100%;
    position: fixed;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#lock { display: flex; background: #111; }

button {
    padding: 10px 20px;
    border-radius: 20px;
    background: #e91e63;
    color: white;
    border: none;
}

.back { position: absolute; top: 20px; left: 20px; }

.slideshow img, video {
    width: 90%;
    max-width: 350px;
    border-radius: 15px;
}

/* FIREWORK */
.firework {
    position: fixed;
    width: 5px;
    height: 5px;
    background: yellow;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}

/* SECRET MESSAGE */
#secret {
    display: none;
    font-size: 1.4rem;
    color: pink;
    padding: 20px;
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lock">
    <h2>Enter Code 🔒</h2>
    <input type="password" id="pass">
    <button onclick="checkPass()">Unlock</button>
</div>

<!-- GIFT -->
<div id="gift">
    <h1 onclick="openGift()" style="font-size:70px;">🎁</h1>
</div>

<!-- MENU -->
<div id="menu">
    <h1>Happy Birthday ❤️</h1>
    <button onclick="startCinematic()">🎬 Play Surprise</button>
</div>

<!-- VIDEO -->
<div class="page" id="video">
    <video id="vid" src="video.mp4"></video>
</div>

<!-- PHOTOS -->
<div class="page" id="photos">
    <img id="slide" src="photo1.jpg.jpeg">
</div>

<!-- SECRET -->
<div id="secret">
Happy Birthday Shweta aka meri akduu bandriya 🐒😂
Attitude full, drama unlimited… but still my favorite person ❤️
Thank you for handling me and my nonsense 🤣✨
Love you bestu!”
</div>

<audio id="song" src="song.mp3" loop></audio>

<script>

// IMAGES
let images = [
"photo1.jpg.jpeg",
"photo2.jpg.jpeg",
"photo3.jpg.jpeg",
"photo4.jpg.jpeg",
"photo5.jpg.jpeg",
"photo6.jpg.jpeg"
];

let index = 0;

// PASSWORD
function checkPass(){
    if(pass.value==="1203"){
        lock.style.display="none";
        gift.style.display="flex";
    }
}

// 🎆 FIREWORK FUNCTION
function firework(){
    for(let i=0;i<50;i++){
        let f=document.createElement("div");
        f.className="firework";
        f.style.left=window.innerWidth/2+"px";
        f.style.top=window.innerHeight/2+"px";
        f.style.setProperty('--x',(Math.random()*400-200)+'px');
        f.style.setProperty('--y',(Math.random()*400-200)+'px');
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),1000);
    }
}

// OPEN GIFT
function openGift(){
    gift.style.display="none";
    menu.style.display="flex";

    // 🎵 start from 0.25 sec
    song.currentTime=0.25;
    song.play();

    // 🎆 fireworks
    firework();
}

// 🎬 CINEMATIC MODE
function startCinematic(){
    menu.style.display="none";
    video.style.display="flex";

    vid.play();

    // when video ends → photos
    vid.onended=()=>{
        video.style.display="none";
        photos.style.display="flex";
        startSlideshow();

        // show secret message after 10 sec
        setTimeout(()=>{
            photos.style.display="none";
            secret.style.display="block";
        },10000);
    };
}

// SLIDESHOW
function startSlideshow(){
    setInterval(()=>{
        slide.src = images[index];
        index = (index+1)%images.length;
    },2000);
}

</script>

</body>
</html>
