<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Shweta ❤️</title>

<style>
:root { --primary: #ff4d6d; --bg: #fff0f3; }

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    overflow: hidden;
    text-align: center;
    transition: background 2s;
}

/* Screens */
.screen {
    display: none;
    height: 100vh;
    width: 100%;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: fixed;
    animation: fadeIn 0.8s;
}

#lock { display: flex; background: #ffb3c1; z-index: 1000; }

/* Card */
.card {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 30px;
    box-shadow: 0 10px 30px rgba(255,77,109,0.2);
}

/* Inputs */
input {
    padding: 12px;
    border-radius: 15px;
    border: 2px solid var(--primary);
    width: 80%;
    margin-bottom: 15px;
    text-align: center;
}

/* Buttons */
button {
    background: var(--primary);
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 50px;
    cursor: pointer;
}

/* Gift */
.gift-box {
    font-size: 7rem;
    cursor: pointer;
    animation: shake 0.5s infinite;
}

@keyframes shake {
    0% { transform: rotate(-5deg); }
    100% { transform: rotate(5deg); }
}

/* Polaroid */
.polaroid {
    background: white;
    padding: 15px 15px 40px;
    border-radius: 5px;
}

.polaroid img {
    width: 100%;
    height: 350px;
    object-fit: cover;
}

/* Floating */
.floating {
    position: fixed;
    animation: fly 6s linear forwards;
}

@keyframes fly {
    to { transform: translateY(-110vh); opacity: 0; }
}

/* Fade */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<audio id="song" loop>
<source src="song.mp3">
</audio>

<!-- LOCK -->
<div id="lock" class="screen">
<div class="card">
<h2>Enter Secret Code</h2>
<input type="tel" id="pass" placeholder="****">
<button onclick="checkPass()">Unlock ✨</button>
</div>
</div>

<!-- GIFT -->
<div id="gift" class="screen">
<div class="gift-box" onclick="openGift()">🎁</div>
<h2>Tap the gift 🎁</h2>
</div>

<!-- MENU -->
<div id="menu" class="screen">
<h1>Happy Birthday ❤️</h1>
<button onclick="openPage('shayari')">📝 Note</button>
<button onclick="openPage('photos')">📸 Photos</button>
<button onclick="openPage('video')">🎥 Video</button>
</div>

<!-- SHAYARI -->
<div id="shayari" class="screen">
<button onclick="back()">⬅</button>
<div class="card">
<div id="text"></div>
</div>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<button onclick="back()">⬅</button>
<div class="polaroid">
<img id="slide" src="photo1.jpg">
</div>
</div>

<!-- 🎬 VIDEO PAGE -->
<div id="video" class="screen" style="background:black;">
<button onclick="back()" style="position:absolute;top:20px;left:20px;">⬅</button>

<video id="bdayVideo" autoplay muted playsinline
style="width:100%;height:100%;object-fit:cover;opacity:0;transition:2s;">
<source src="video.mp4">
</video>

<div id="videoText" style="
position:absolute;
bottom:15%;
width:100%;
color:white;
font-size:24px;
opacity:0;
transition:2s;">
For You Shweta ❤️
</div>
</div>

<script>

let images = ["photo1.jpg","photo2.jpg","photo3.jpg"];
let index = 0;
let i = 0;

const msg = `Happy Birthday Shweta ❤️
You are special 💖`;

function checkPass(){
    if(document.getElementById('pass').value === "1203"){
        lock.style.display = "none";
        gift.style.display = "flex";
    }
}

function openGift(){
    gift.style.display = "none";
    menu.style.display = "flex";
    song.play();
    startHearts();

    setTimeout(() => {
        openPage('video'); // auto video 🎬
    }, 2000);
}

function openPage(p){
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById(p).style.display = 'flex';

    if(p === "video"){
        let vid = document.getElementById("bdayVideo");
        let text = document.getElementById("videoText");

        vid.currentTime = 0;
        vid.play();

        setTimeout(()=>{
            vid.style.opacity = 1;
            text.style.opacity = 1;
        },300);
    }
}

function back(){
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    menu.style.display = "flex";

    let vid = document.getElementById("bdayVideo");
    if(vid){
        vid.pause();
        vid.style.opacity = 0;
    }

    document.getElementById("videoText").style.opacity = 0;
}

/* slideshow */
setInterval(()=>{
    let img = document.getElementById("slide");
    if(img){
        index = (index+1)%images.length;
        img.src = images[index];
    }
},3000);

/* hearts */
function startHearts(){
    setInterval(()=>{
        let h = document.createElement("div");
        h.innerHTML = "❤️";
        h.className = "floating";
        h.style.left = Math.random()*100+"vw";
        h.style.top = "100vh";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6000);
    },300);
}

</script>

</body>
</html>
